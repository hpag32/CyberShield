<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>

<link rel="icon" type="image/png" href="images/favicon.png">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.password-container{

width:90%;
max-width:650px;

margin:70px auto;

background:#161b22;

padding:40px;

border-radius:20px;

text-align:center;

}

.password-container input{

width:100%;

padding:15px;

margin:20px 0;

font-size:18px;

border-radius:10px;

border:none;

outline:none;

}

#strengthBar{

height:15px;

background:#333;

border-radius:10px;

overflow:hidden;

}

#progress{

height:100%;

width:0%;

transition:.4s;

}

#result{

margin-top:20px;

font-size:22px;

font-weight:bold;

}

#tips{

margin-top:15px;

line-height:1.8;

color:#d1d5db;

text-align:left;

}

</style>

</head>

<body>

<header>

<nav>

<h2>🛡 CyberShield</h2>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="password.html">Password Checker</a></li>

<li><a href="detector.html">Fraud Detector</a></li>

<li><a href="tips.html">Tips</a></li>

<li><a href="quiz.html">Quiz</a></li>

<li><a href="about.html">About</a></li>

</ul>

<button onclick="toggleTheme()" id="themeBtn">🌙</button>


</nav>

</header>

<div class="password-container">

<h1>🔐 Password Strength Checker</h1>

<p>Enter your password below.</p>

<input
type="password"
id="password"
placeholder="Enter Password"
onkeyup="checkPassword()">

<div id="strengthBar">

<div id="progress"></div>

</div>

<h2 id="result"></h2>

<div id="tips"></div>

</div>

<script src="script.js"></script>

</html>
